<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Love Surprise PRO</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family: Arial;
}

/* ===== CARTA ===== */
#carta{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10000;
}

.sobre{
    position:relative;
    width:220px;
    height:150px;
    cursor:pointer;
    perspective:1000px;
}

.cuerpo{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff4da6;
    border-radius:6px;
}

.tapa{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff1a75;
    clip-path: polygon(0 0, 50% 55%, 100% 0);
    transform-origin: top;
    transition: transform 0.8s ease;
}

.mensaje{
    position:absolute;
    width:100%;
    text-align:center;
    top:50%;
    transform:translateY(-50%);
    color:white;
    font-weight:bold;
}

.sobre.abrir .tapa{
    transform: rotateX(180deg);
}

.sobre.abrir .mensaje{
    animation: subir 1s forwards;
}

@keyframes subir{
    0%{ transform:translateY(0); opacity:1;}
    100%{ transform:translateY(-120px); opacity:0;}
}

/* ===== LOADER ===== */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loader-box{
    width:80%;
    max-width:300px;
    height:6px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
}

.barra{
    height:100%;
    width:40%;
    background: linear-gradient(90deg,#ff0055,#ff4da6,#ff0055);
    animation:mover 1.2s linear infinite;
}

@keyframes mover{
    0%{ transform:translateX(-100%);}
    100%{ transform:translateX(300%);}
}

/* ===== CAPAS ===== */
.layer{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
}

.text{ position:absolute; white-space:nowrap; opacity:0.9;}
.heart{ position:absolute; opacity:0.9;}
.imgRain{
    position:absolute;
    border-radius:12px;
    object-fit:cover;
    box-shadow:0 0 15px pink;
}

.white{ color:#fff; text-shadow:0 0 8px #fff; }
.pink{ color:#ff4da6; text-shadow:0 0 10px #ff4da6; }
.red{ color:#ff0000; text-shadow:0 0 10px red; }

@keyframes caer{
    from{ transform:translateY(var(--startY)); opacity:0;}
    to{ transform:translateY(calc(var(--startY) + var(--distance))); opacity:1;}
}

@keyframes explosion{
    from{ transform:translate(0,0) scale(1); opacity:1;}
    to{ transform:translate(var(--x), var(--y)) scale(0.5); opacity:0;}
}
</style>
</head>

<body>

<div id="carta">
    <div class="sobre" id="sobre">
        <div class="tapa"></div>
        <div class="cuerpo"></div>
        <div class="mensaje">💌 Para ti</div>
    </div>
</div>

<div id="loader">
    <div class="loader-box">
        <div class="barra"></div>
    </div>
</div>

<!-- 🎵 AUDIO -->
<audio id="musica" loop preload="auto" playsinline>
<source src="https://raw.githubusercontent.com/dania123456789123456-del/Carta-1/main/Jay_Wheeler.mp3" type="audio/mpeg">
</audio>

<div class="layer" id="back"></div>
<div class="layer" id="mid"></div>
<div class="layer" id="front"></div>

<script>
const musica = document.getElementById("musica");

const imagenes=[
"https://i.postimg.cc/nrt3JvVQ/IMG-20241128-WA0128.jpg",
"https://i.postimg.cc/CKzPHh6g/IMG-20241128-WA0129.jpg",
"https://i.postimg.cc/YShgyhHX/IMG-20250202-WA0025.jpg"
];

const capas=[
{el:back,speed:3,size:0.7,density:160},
{el:mid,speed:2.5,size:1,density:120},
{el:front,speed:2,size:1.3,density:90}
];

const textos=["I love you","Te amo 💘","Love you ❤️","Muak 💋"];
const colores=["white","pink","red"];

/* LLUVIA COMPLETA */
function crearElemento(layer){
let el;
let tipo=Math.random();

if(tipo<0.5){
el=document.createElement("div");
el.className="text";
el.innerText=textos[Math.floor(Math.random()*textos.length)];
el.classList.add(colores[Math.floor(Math.random()*colores.length)]);
}
else if(tipo<0.8){
el=document.createElement("div");
el.className="heart";
el.innerText="❤";
el.classList.add(colores[Math.floor(Math.random()*colores.length)]);
}
else{
el=document.createElement("img");
el.className="imgRain";
el.src=imagenes[Math.floor(Math.random()*imagenes.length)];
}

el.style.left=Math.random()*100+"vw";
el.style.setProperty("--startY",Math.random()*100+"vh");
el.style.setProperty("--distance",(120+Math.random()*120)+"px");

if(el.tagName==="IMG"){
el.style.width=(30+Math.random()*40)*layer.size+"px";
}else{
el.style.fontSize=(14+Math.random()*16)*layer.size+"px";
}

let dur=layer.speed+Math.random()*1.5;
el.style.animation=`caer ${dur}s linear`;

layer.el.appendChild(el);
setTimeout(()=>el.remove(),dur*1000);
}

function iniciarLluvia(){
capas.forEach(l=>{
setInterval(()=>crearElemento(l),l.density);
});
}

/* 💥 EXPLOSIÓN */
document.addEventListener("click",e=>{
for(let i=0;i<80;i++){
crearParticula(e.clientX,e.clientY);
}
});

function crearParticula(x,y){
let el=document.createElement("div");
el.className="heart";
el.innerText="❤";
el.classList.add(colores[Math.floor(Math.random()*colores.length)]);
el.style.position="fixed";
el.style.left=x+"px";
el.style.top=y+"px";

let angle=Math.random()*360;
let distance=80+Math.random()*200;

let dx=Math.cos(angle)*distance+"px";
let dy=Math.sin(angle)*distance+"px";

el.style.setProperty("--x",dx);
el.style.setProperty("--y",dy);
el.style.animation="explosion 1s ease-out forwards";

document.body.appendChild(el);
setTimeout(()=>el.remove(),1000);
}

/* 💌 CARTA */
const sobre=document.getElementById("sobre");

sobre.onclick=()=>{

// activar audio SIN que suene aún
musica.muted = true;
musica.play().then(()=>{
    musica.pause();
    musica.currentTime = 0;
    musica.muted = false;
}).catch(()=>{});

sobre.classList.add("abrir");

setTimeout(()=>{
    carta.style.display="none";
    loader.style.display="flex";

    setTimeout(()=>{
        loader.style.display="none";
        iniciarLluvia();

        // 🔥 AQUÍ empieza la música (sin bloqueo)
        musica.play().catch(()=>{});

    },2500);

},1000);
};
</script>

</body>
</html>
